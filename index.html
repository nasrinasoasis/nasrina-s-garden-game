<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nasrina's Aesthetic Oasis</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            cursor: url('https://cdn.cursors-4u.net/previews/pink-flowers-6f858f86-32.webp') 32 32, auto !important;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #fff5f7; /* Very Soft Blush */
            overflow: hidden;
        }

        /* --- THE PINK PALACE BACKGROUND --- */
        #game-bg {
            position: absolute;
            inset: 0;
            z-index: -1;
            background: linear-gradient(135deg, #fff0f5 0%, #fdf2f8 50%, #f0fff4 100%);
            image-rendering: auto;
            filter: brightness(1.05);
        }

        #game-container {
            width: 95vw;
            max-width: 450px;
            height: 90vh;
            position: relative;
            background: rgba(255, 255, 255, 0.5);
            border: 5px solid #ffc1cc; /* Peony Pink */
            border-radius: 40px;
            box-shadow: 0 15px 40px rgba(255, 182, 193, 0.4), inset 0 0 20px rgba(255,255,255,0.8);
            overflow: hidden;
            backdrop-filter: blur(5px);
        }

        /* --- AESTHETIC HEADER 🎀 --- */
        #ui-layer {
            height: 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 25px;
            background: rgba(255, 193, 204, 0.8);
            border-bottom: 2px solid #fff;
            color: #fff;
            font-family: 'Press Start 2P', cursive;
            font-size: 8px;
            letter-spacing: 1px;
        }

        /* --- THE ALICE DIALOGUE (Sage & Rose) 🌿 --- */
        .alice-box {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 85%;
            background: rgba(255, 255, 255, 0.95);
            border: 3px solid #ffc1cc;
            border-radius: 15px;
            padding: 12px;
            font-family: 'Press Start 2P', cursive;
            font-size: 7px;
            line-height: 1.5;
            color: #5a7d55; /* Soft Sage */
            visibility: hidden;
            z-index: 20;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        .alice-name {
            color: #ff69b4;
            font-weight: bold;
            margin-bottom: 4px;
            display: block;
        }

        /* --- GAME ASSETS --- */
        #player-basket {
            position: absolute;
            bottom: 80px;
            left: calc(50% - 35px);
            font-size: 65px;
            pointer-events: none;
            filter: drop-shadow(0 10px 10px rgba(255, 182, 193, 0.6));
        }

        .falling-item {
            position: absolute;
            font-size: 38px;
            pointer-events: none;
            filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.8));
            animation: float 3s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        /* --- START SCREEN (Ethereal) --- */
        #start-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(255, 240, 245, 0.95), rgba(240, 255, 244, 0.95));
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        h1 { 
            font-family: 'Playfair Display', serif; 
            font-style: italic; 
            font-size: 28px; 
            color: #db7093; 
            margin-bottom: 10px;
            text-align: center;
        }
        
        .sub-text {
            font-family: 'Varela Round', sans-serif;
            font-size: 12px;
            color: #88b083;
            margin-bottom: 30px;
        }

        #start-btn {
            font-family: 'Press Start 2P', cursive;
            font-size: 10px;
            padding: 18px 35px;
            background: #ffc1cc;
            color: white;
            border: 3px solid #fff;
            border-radius: 50px;
            box-shadow: 0 8px 20px rgba(255, 193, 204, 0.4);
            cursor: pointer;
            transition: all 0.3s;
        }
        #start-btn:hover { background: #d4edda; color: #5a7d55; }

        /* Mobile Tap Regions */
        #mobile-controls {
            display: flex;
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 70%; /* Huge tap area */
            z-index: 5;
        }
        .control-zone { flex-grow: 1; }
    </style>
</head>
<body>

<div id="game-bg"></div>

<div id="game-container">
    <div id="ui-layer">
        <div>SCORE:<span id="score">0</span></div>
        <div id="level-tag">MOOD:🌱</div>
    </div>
    
    <div id="play-area" style="height: 100%; position: relative;">
        <div id="alice-dialog" class="alice-box">
            <span class="alice-name">Alice</span>
            <span id="dialog-text">I have been waiting for you!</span>
        </div>
        
        <div id="player-basket">🧺</div>
    </div>

    <div id="start-overlay">
        <h1>Nasrina's Oasis</h1>
        <div class="sub-text">a wonderful dream... ✨</div>
        <button id="start-btn">ENTER GARDEN</button>
    </div>

    <div id="mobile-controls">
        <div id="move-left" class="control-zone"></div>
        <div id="move-right" class="control-zone"></div>
    </div>
</div>

<script>
    const playArea = document.getElementById('play-area');
    const basket = document.getElementById('player-basket');
    const scoreEl = document.getElementById('score');
    const levelEl = document.getElementById('level-tag');
    const startOverlay = document.getElementById('start-overlay');
    const startBtn = document.getElementById('start-btn');
    const aliceBox = document.getElementById('alice-dialog');
    const aliceText = document.getElementById('dialog-text');

    let score = 0;
    let gameActive = false;
    let spawnRate = 1100;
    let itemSpeed = 5;
    const basketWidth = 70;

    const items = ['🌸', '🍵', '📖', '🕯️', '🌿', '🌷', '✨', '💿', '🦋', '🎀'];

    playArea.addEventListener('mousemove', (e) => {
        if (!gameActive) return;
        moveBasketTo(e.clientX);
    });

    document.getElementById('move-left').addEventListener('touchstart', (e) => {
        if (!gameActive) return; e.preventDefault(); teleportBasket('left');
    });
    document.getElementById('move-right').addEventListener('touchstart', (e) => {
        if (!gameActive) return; e.preventDefault(); teleportBasket('right');
    });

    function moveBasketTo(clientX) {
        const rect = playArea.getBoundingClientRect();
        let x = clientX - rect.left - (basketWidth / 2);
        x = Math.max(0, Math.min(x, rect.width - basketWidth));
        basket.style.left = x + 'px';
    }

    function teleportBasket(side) {
        const rect = playArea.getBoundingClientRect();
        if(side === 'left') basket.style.left = '20px';
        else basket.style.left = (rect.width - basketWidth - 20) + 'px';
    }

    function showDialog(text, delay) {
        gameActive = false;
        aliceText.innerText = text;
        aliceBox.style.visibility = 'visible';
        setTimeout(() => {
            aliceBox.style.visibility = 'hidden';
            gameActive = true;
            createItem();
        }, delay);
    }

    function checkLevelUp() {
        if (score === 10) {
            levelEl.innerText = "MOOD:🌷";
            spawnRate = 800; itemSpeed = 7;
            showDialog("The garden is blooming for you! 🌷", 2000);
        } else if (score === 25) {
            levelEl.innerText = "MOOD:✨";
            spawnRate = 500; itemSpeed = 9;
            showDialog("Look like a wonderful dream... ✨", 2000);
        }
    }

    function createItem() {
        if (!gameActive) return;
        const item = document.createElement('div');
        item.className = 'falling-item';
        item.innerText = items[Math.floor(Math.random() * items.length)];
        
        const rect = playArea.getBoundingClientRect();
        item.style.left = Math.random() * (rect.width - 40) + 'px';
        item.style.top = '-60px';
        playArea.appendChild(item);

        let top = -60;
        const fallInterval = setInterval(() => {
            if (!gameActive) { clearInterval(fallInterval); return;}
            top += itemSpeed;
            item.style.top = top + 'px';

            const bRect = basket.getBoundingClientRect();
            const iRect = item.getBoundingClientRect();

            if (iRect.bottom >= bRect.top + 20 && iRect.right >= bRect.left && iRect.left <= bRect.right && iRect.top <= bRect.bottom) {
                score++;
                scoreEl.innerText = score;
                checkLevelUp();
                item.remove();
                clearInterval(fallInterval);
            }
            if (top > rect.height) { item.remove(); clearInterval(fallInterval); }
        }, 20);

        setTimeout(createItem, spawnRate);
    }

    startBtn.addEventListener('click', () => {
        gameActive = true;
        score = 0;
        scoreEl.innerText = score;
        startOverlay.style.display = 'none';
        createItem();
    });
</script>
</body>
</html>
