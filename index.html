<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nasrina's Oasis Path</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            cursor: url('https://cdn.cursors-4u.net/previews/pink-flowers-6f858f86-32.webp') 32 32, auto !important;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #fff5f7;
            overflow: hidden;
            font-family: 'Varela Round', sans-serif;
        }

        #game-container {
            width: 100vw;
            height: 100vh;
            max-width: 500px;
            max-height: 900px;
            position: relative;
            background: linear-gradient(to bottom, #e0f7fa, #fff0f5);
            border: 8px solid #ffc1cc;
            border-radius: 40px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
        }

        /* --- THE MOVING ROAD --- */
        #sky {
            position: absolute;
            top: 0; width: 100%; height: 60%;
            background: linear-gradient(to bottom, #a1c4fd 0%, #c2e9fb 100%);
            opacity: 0.5;
        }

        #road {
            position: absolute;
            bottom: 0;
            width: 200%; /* Double width for looping */
            height: 40%;
            background: #fdf2f8;
            border-top: 6px solid #ffc1cc;
            display: flex;
            align-items: flex-end;
            animation: moveRoad 10s linear infinite;
        }

        @keyframes moveRoad {
            from { transform: translateX(0); }
            to { transform: translateX(-50%); }
        }

        /* Decorative Flowers on Path */
        .path-flower {
            font-size: 20px;
            margin-right: 100px;
            opacity: 0.6;
        }

        /* --- THE CHARACTER --- */
        #player {
            position: absolute;
            bottom: 30%;
            left: 50px;
            font-size: 50px;
            z-index: 10;
            transition: bottom 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* --- OBSTACLES & ITEMS --- */
        .collectible {
            position: absolute;
            bottom: 45%;
            right: -50px;
            font-size: 30px;
        }

        /* --- UI --- */
        #ui {
            position: absolute;
            top: 30px;
            width: 100%;
            text-align: center;
            font-family: 'Press Start 2P', cursive;
            font-size: 10px;
            color: #db7093;
            z-index: 100;
        }

        #start-screen {
            position: absolute;
            inset: 0;
            background: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
            text-align: center;
            padding: 20px;
        }

        h1 { font-family: 'Playfair Display', serif; font-style: italic; color: #ff69b4; }
        
        button {
            padding: 15px 30px;
            border-radius: 50px;
            border: 2px solid #ffc1cc;
            background: #fff;
            font-family: 'Press Start 2P';
            font-size: 8px;
            color: #db7093;
            margin-top: 20px;
        }
    </style>
</head>
<body onclick="jump()">

<div id="game-container">
    <div id="ui">CHARM LEVEL: <span id="score">0</span></div>
    
    <div id="sky"></div>
    
    <div id="player">🎀</div>

    <div id="road">
        <span class="path-flower">🌸</span><span class="path-flower">🌷</span>
        <span class="path-flower">🌸</span><span class="path-flower">🌷</span>
        <span class="path-flower">🌸</span><span class="path-flower">🌷</span>
    </div>

    <div id="start-screen">
        <h1>Nasrina's Road to Peace</h1>
        <p style="color: #88b083; font-style: italic;">tap to jump through the oasis...</p>
        <button onclick="startGame()">START ADVENTURE</button>
    </div>
</div>

<script>
    let score = 0;
    let isJumping = false;
    let gameActive = false;

    function startGame() {
        document.getElementById('start-screen').style.display = 'none';
        gameActive = true;
        spawnItem();
    }

    function jump() {
        if (!gameActive || isJumping) return;
        isJumping = true;
        const player = document.getElementById('player');
        player.style.bottom = '55%';
        
        setTimeout(() => {
            player.style.bottom = '30%';
            setTimeout(() => { isJumping = false; }, 400);
        }, 400);
    }

    function spawnItem() {
        if (!gameActive) return;
        const item = document.createElement('div');
        item.className = 'collectible';
        const items = ['🍵', '💿', '📖', '✨', '🧘‍♀️'];
        item.innerText = items[Math.floor(Math.random() * items.length)];
        document.getElementById('game-container').appendChild(item);

        let pos = 500;
        const moveInt = setInterval(() => {
            pos -= 5;
            item.style.left = pos + 'px';

            // Check collision
            const pRect = document.getElementById('player').getBoundingClientRect();
            const iRect = item.getBoundingClientRect();

            if (iRect.left < pRect.right && iRect.right > pRect.left && iRect.top < pRect.bottom && iRect.bottom > pRect.top) {
                score++;
                document.getElementById('score').innerText = score;
                item.remove();
                clearInterval(moveInt);
            }

            if (pos < -50) {
                item.remove();
                clearInterval(moveInt);
            }
        }, 20);

        setTimeout(spawnItem, 2000 + Math.random() * 2000);
    }
</script>
</body>
</html>
