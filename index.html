<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nasrina's Strawberry Matcha Oasis</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body, html { height: 100%; width: 100%; background: #f0f4ef; overflow: hidden; font-family: 'Playfair Display', serif; }

        /* STRAWBERRY MATCHA GRADIENT */
        #game-container {
            width: 100vw; height: 100vh; position: relative;
            background: linear-gradient(180deg, #d4e4bc 0%, #ffe5ec 100%);
            overflow: hidden; display: flex; flex-direction: column;
        }

        /* SCENERY - STRAWBERRY GARDEN */
        .scenery {
            position: absolute; bottom: 15%; width: 400%;
            display: flex; align-items: flex-end; white-space: nowrap;
            pointer-events: none; animation: move 25s linear infinite;
        }
        #palace-layer { z-index: 2; opacity: 0.3; font-size: 100px; animation-duration: 45s; }
        #garden-layer { z-index: 4; font-size: 70px; animation-duration: 18s; }

        @keyframes move { from { transform: translateX(0); } to { transform: translateX(-50%); } }

        /* UI & COUNTER */
        #ui-bar {
            position: absolute; top: 20px; width: 100%; padding: 0 20px;
            display: flex; justify-content: center; z-index: 1001;
            font-family: 'Press Start 2P', cursive; font-size: 10px; color: #7a9461;
        }

        #nasrina-box {
            position: absolute; top: 60px; left: 50%; transform: translateX(-50%);
            width: 90%; background: rgba(255, 255, 255, 0.92);
            border: 3px solid #ffc1cc; border-radius: 25px; padding: 15px;
            font-family: 'Press Start 2P', cursive; font-size: 7px; color: #5a7d55; z-index: 1000;
            box-shadow: 0 8px 15px rgba(122, 148, 97, 0.2);
        }

        /* PLAYER & ADVENTURE ITEMS */
        #player {
            position: absolute; bottom: 20%; left: 10%; font-size: 65px; z-index: 100;
            transition: bottom 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .collectible { position: absolute; bottom: 35%; font-size: 45px; z-index: 50; filter: drop-shadow(0 0 10px white); }

        /* WIN SCREEN */
        #win-screen {
            display: none; position: absolute; inset: 0; background: #fdf0f4;
            z-index: 3000; flex-direction: column; justify-content: center; align-items: center; text-align: center;
        }

        button {
            padding: 18px 30px; border-radius: 50px; background: #7a9461; border: none; 
            color: white; font-family: 'Press Start 2P'; font-size: 9px; cursor: pointer; margin-top: 20px;
        }
    </style>
</head>
<body onclick="jump()" ontouchstart="jump()">

<div id="game-container">
    <div id="ui-bar">
        <span>🍵 COLLECTION: <span id="score">0</span>/10</span>
    </div>

    <div id="nasrina-box">
        <span style="color: #ff69b4;">Nasrina:</span><br>
        <span id="quest-text">Grab 10 treats to unlock your Strawberry Matcha gift! 🍵🍓</span>
    </div>

    <div id="palace-layer" class="scenery">🏛️ ✨ 🍓 🏛️ ✨ 🍓 🏛️ ✨ 🍓 🏛️ ✨ 🍓</div>
    <div id="garden-layer" class="scenery">🌿 🌸 🍃 🍓 🌿 🌸 🍃 🍓 🌿 🌸 🍃 🍓</div>

    <div id="player">🌸</div>

    <div id="win-screen">
        <h1 style="color: #7a9461; font-size: 50px;">🍵🍓</h1>
        <h2 style="color: #db7093; margin: 20px; font-style: italic;">Royal Refresh Complete!</h2>
        <p style="padding: 0 40px; color: #5a7d55; line-height: 1.6;">You've mastered the Oasis. Your Strawberry Matcha kit is waiting for you this fall!</p>
        <button onclick="location.reload()">PLAY AGAIN</button>
    </div>
</div>

<script>
    let score = 0; let gameActive = true;
    const player = document.getElementById('player');

    function jump() {
        if (!gameActive || player.style.bottom === '55%') return;
        player.style.bottom = '55%';
        setTimeout(() => { player.style.bottom = '20%'; }, 400);
    }

    function spawn() {
        if (!gameActive) return;
        const item = document.createElement('div');
        item.className = 'collectible';
        const treats = ['🍓', '🍵', '🎀', '✨'];
        item.innerText = treats[Math.floor(Math.random() * treats.length)];
        item.style.left = '110vw';
        document.getElementById('game-container').appendChild(item);

        let pos = 110;
        const move = setInterval(() => {
            if (!gameActive) { item.remove(); clearInterval(move); return; }
            pos -= 1.8; item.style.left = pos + 'vw';
            
            const pRect = player.getBoundingClientRect();
            const iRect = item.getBoundingClientRect();

            if (iRect.left < pRect.right - 10 && iRect.right > pRect.left + 10 && 
                iRect.top < pRect.bottom && iRect.bottom > pRect.top) {
                score++;
                document.getElementById('score').innerText = score;
                item.remove(); clearInterval(move);
                if (score === 10) { gameActive = false; document.getElementById('win-screen').style.display = 'flex'; }
            }
            if (pos < -15) { item.remove(); clearInterval(move); }
        }, 20);
        setTimeout(spawn, 2200);
    }
    spawn();
</script>
</body>
</html>
