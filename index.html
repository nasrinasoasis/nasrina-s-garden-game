<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nasrina's Lush Oasis</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            cursor: url('https://cdn.cursors-4u.net/previews/pink-flowers-6f858f86-32.webp') 32 32, auto !important;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background: #fff5f7; overflow: hidden;
            font-family: 'Playfair Display', serif;
        }

        #game-container {
            width: 100vw; height: 100vh;
            max-width: 450px; position: relative;
            background: linear-gradient(to bottom, #fbc2eb 0%, #a6c1ee 100%);
            overflow: hidden;
            border: 8px solid #ffc1cc;
        }

        /* --- THE GARDEN LAYERS --- */
        .layer {
            position: absolute; bottom: 30%; width: 200%;
            display: flex; align-items: flex-end;
            animation: walk 15s linear infinite;
            pointer-events: none;
        }

        #back-trees { z-index: 2; opacity: 0.5; animation-duration: 30s; font-size: 100px; }
        #front-flowers { z-index: 4; animation-duration: 12s; font-size: 60px; }

        @keyframes walk {
            from { transform: translateX(0); }
            to { transform: translateX(-50%); }
        }

        /* --- THE PATH --- */
        #path {
            position: absolute; bottom: 0; width: 100%; height: 30%;
            background: #fff; border-top: 5px solid #ffc1cc;
            z-index: 10;
        }

        /* --- THE CHARACTER --- */
        #player {
            position: absolute; bottom: 22%; left: 50px;
            font-size: 60px; z-index: 100;
            transition: bottom 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* --- ALICE'S DIALOGUE --- */
        #alice-box {
            position: absolute; top: 70px; left: 50%;
            transform: translateX(-50%); width: 85%;
            background: rgba(255, 255, 255, 0.9);
            border: 3px solid #ffc1cc; border-radius: 20px;
            padding: 15px; font-family: 'Press Start 2P', cursive;
            font-size: 7px; color: #5a7d55; z-index: 1000;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        /* --- FLOATING PETALS --- */
        .petal {
            position: absolute; color: #ffc1cc; font-size: 20px;
            z-index: 20; animation: fall 5s linear infinite;
        }
        @keyframes fall {
            0% { transform: translateY(-10vh) translateX(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) translateX(100px) rotate(360deg); opacity: 0; }
        }

        .collectible {
            position: absolute; bottom: 40%; font-size: 35px; z-index: 50;
        }

        #start-screen {
            position: absolute; inset: 0; background: white;
            z-index: 2000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
        }

        button {
            padding: 20px 40px; border-radius: 50px; border: 2px solid #ffc1cc;
            background: white; font-family: 'Press Start 2P'; font-size: 8px;
            color: #db7093; margin-top: 20px;
        }
    </style>
</head>
<body onclick="jump()" ontouchstart="jump()">

<div id="game-container">
    <div id="back-trees" class="layer">
        🌳 🏛️ 🌳 🌳 🏛️ 🌳 🌳 🏛️ 🌳 🌳
    </div>

    <div id="front-flowers" class="layer">
        🌸 🌷 🌿 🌸 🌷 🌿 🌸 🌷 🌿 🌸 🌷 🌿
    </div>

    <div id="path"></div>
    
    <div id="player">🧚‍♀️</div>

    <div id="alice-box">
        <span style="color: #ff69b4;">Alice:</span><br>
        <span id="quest-text">It's a beautiful day in the Oasis! Help me find 5 flowers...</span>
    </div>

    <div id="start-screen">
        <h1 style="font-style: italic; color: #ffb6c1;">The Lush Garden</h1>
        <p style="color: #88b083;">a peaceful adventure</p>
        <button onclick="startGame(event)">ENTER GARDEN</button>
    </div>
</div>

<script>
    let score = 0; let isJumping = false; let gameActive = false;
    const player = document.getElementById('player');
    const questText = document.getElementById('quest-text');
    const container = document.getElementById('game-container');

    function startGame(e) {
        e.stopPropagation();
        document.getElementById('start-screen').style.display = 'none';
        gameActive = true;
        createPetals();
        spawnItem();
    }

    function createPetals() {
        setInterval(() => {
            if(!gameActive) return;
            const petal = document.createElement('div');
            petal.className = 'petal';
            petal.innerText = '🌸';
            petal.style.left = Math.random() * 100 + 'vw';
            container.appendChild(petal);
            setTimeout(() => petal.remove(), 5000);
        }, 1000);
    }

    function jump() {
        if (!gameActive || isJumping) return;
        isJumping = true;
        player.style.bottom = '50%';
        setTimeout(() => {
            player.style.bottom = '22%';
            setTimeout(() => { isJumping = false; }, 400);
        }, 400);
    }

    function spawnItem() {
        if (!gameActive) return;
        const item = document.createElement('div');
        item.className = 'collectible';
        item.innerText = ['🎀', '✨', '💿', '🍵'][Math.floor(Math.random() * 4)];
        container.appendChild(item);

        let pos = 500;
        const moveInt = setInterval(() => {
            if(!gameActive) return;
            pos -= 5;
            item.style.left = pos + 'px';

            const pRect = player.getBoundingClientRect();
            const iRect = item.getBoundingClientRect();

            if (iRect.left < pRect.right - 10 && iRect.right > pRect.left + 10 && iRect.top < pRect.bottom && iRect.bottom > pRect.top) {
                score++;
                if (score === 5) questText.innerText = "Alice: You're doing so well! Let's find 10 tea cups.";
                item.remove(); clearInterval(moveInt);
            }
            if (pos < -50) { item.remove(); clearInterval(moveInt); }
        }, 20);
        setTimeout(spawnItem, 3000);
    }
</script>
</body>
</html>
