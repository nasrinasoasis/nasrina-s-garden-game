<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nasrina's Pink Palace Oasis</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body, html { height: 100%; width: 100%; background: #fff5f7; overflow: hidden; font-family: 'Playfair Display', serif; }

        #game-container {
            width: 100vw; height: 100vh; position: relative;
            background: linear-gradient(180deg, #fbc2eb 0%, #a6c1ee 100%);
            overflow: hidden; display: flex; flex-direction: column;
        }

        /* --- THE PALACE & GARDEN SCENERY --- */
        .scenery {
            position: absolute; bottom: 20%; width: 200%;
            display: flex; align-items: flex-end; white-space: nowrap;
            pointer-events: none; animation: move 20s linear infinite;
        }
        #palace-layer { z-index: 2; opacity: 0.4; font-size: 120px; animation-duration: 40s; }
        #garden-layer { z-index: 4; font-size: 80px; animation-duration: 15s; }

        @keyframes move { from { transform: translateX(0); } to { transform: translateX(-50%); } }

        /* --- UI & COUNTER --- */
        #ui-bar {
            position: absolute; top: 20px; width: 100%; padding: 0 20px;
            display: flex; justify-content: space-between; align-items: center; z-index: 1001;
            font-family: 'Press Start 2P', cursive; font-size: 9px; color: #db7093;
        }

        #nasrina-box {
            position: absolute; top: 70px; left: 50%; transform: translateX(-50%);
            width: 85%; background: rgba(255, 255, 255, 0.9);
            border: 3px solid #ffc1cc; border-radius: 20px; padding: 15px;
            font-family: 'Press Start 2P', cursive; font-size: 7px; color: #5a7d55; z-index: 1000;
        }

        /* --- PLAYER & ITEMS --- */
        #player {
            position: absolute; bottom: 22%; left: 10%; font-size: 60px; z-index: 100;
            transition: bottom 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .collectible { position: absolute; bottom: 35%; font-size: 40px; z-index: 50; }

        /* --- END GAME --- */
        #win-screen {
            display: none; position: absolute; inset: 0; background: rgba(255, 255, 255, 0.95);
            z-index: 3000; flex-direction: column; justify-content: center; align-items: center; text-align: center;
        }
    </style>
</head>
<body onclick="jump()" ontouchstart="jump()">

<div id="game-container">
    <div id="ui-bar">
        <span>CHARMS: <span id="score">0</span>/30</span>
    </div>

    <div id="nasrina-box">
        <span style="color: #ff69b4;">Nasrina:</span><br>
        <span id="quest-text">Welcome home! Gather 30 charms to unlock your Palace Crown...</span>
    </div>

    <div id="palace-layer" class="scenery">🏰 ✨ 🏰 ✨ 🏰 ✨ 🏰 ✨ 🏰 ✨ 🏰 ✨</div>
    <div id="garden-layer" class="scenery">🌸 🌷 🌿 🌸 🌷 🌿 🌸 🌷 🌿 🌸 🌷 🌿</div>

    <div id="player">🌸</div>

    <div id="win-screen">
        <h1 style="color: #ffb6c1; font-size: 40px;">👑</h1>
        <h2 style="color: #db7093; margin: 20px;">Oasis Queen!</h2>
        <p style="padding: 20px; line-height: 1.6;">You've unlocked the full beauty of the Palace. Your journey is just beginning!</p>
        <button onclick="location.reload()" style="padding: 15px 30px; border-radius: 50px; background: #ffc1cc; border: none; color: white; font-family: 'Press Start 2P'; font-size: 8px;">STROLL AGAIN</button>
    </div>
</div>

<script>
    let score = 0; let gameActive = true;
    const player = document.getElementById('player');
    const questText = document.getElementById('quest-text');

    function jump() {
        if (player.style.bottom === '55%') return;
        player.style.bottom = '55%';
        setTimeout(() => { player.style.bottom = '22%'; }, 400);
    }

    function spawn() {
        if (!gameActive) return;
        const item = document.createElement('div');
        item.className = 'collectible';
        item.innerText = score >= 29 ? '🎀' : ['✨', '💎', '🍵', '💖'][Math.floor(Math.random()*4)];
        item.style.left = '110vw';
        document.getElementById('game-container').appendChild(item);

        let pos = 110;
        const move = setInterval(() => {
            pos -= 1.5; item.style.left = pos + 'vw';
            const pRect = player.getBoundingClientRect();
            const iRect = item.getBoundingClientRect();

            if (iRect.left < pRect.right - 10 && iRect.right > pRect.left + 10 && iRect.top < pRect.bottom && iRect.bottom > pRect.top) {
                score++;
                document.getElementById('score').innerText = score;
                item.remove(); clearInterval(move);
                if (score === 30) { gameActive = false; document.getElementById('win-screen').style.display = 'flex'; }
            }
            if (pos < -10) { item.remove(); clearInterval(move); }
        }, 20);
        setTimeout(spawn, 2500);
    }
    spawn();
</script>
</body>
</html>
