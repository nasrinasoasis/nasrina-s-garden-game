<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nasrina's Garden Catch</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #f0fff4 0%, #fff0f5 50%, #f0fff4 100%);
            font-family: 'Playfair Display', serif;
            overflow: hidden;
            cursor: none;
        }
        #game-container {
            width: 100%;
            max-width: 600px;
            height: 80vh;
            position: relative;
            border: 4px solid white;
            border-radius: 40px;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 50px rgba(255, 182, 193, 0.4);
        }
        #score-board {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #2d5a27;
            font-size: 1.5rem;
            font-style: italic;
            z-index: 10;
        }
        #player-basket {
            position: absolute;
            bottom: 30px;
            font-size: 60px;
            pointer-events: none;
        }
        .falling-item {
            position: absolute;
            font-size: 35px;
            pointer-events: none;
        }
        #start-overlay {
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            border-radius: 40px;
            cursor: default;
        }
        h1 { color: #ff69b4; font-style: italic; margin-bottom: 20px; }
        #start-btn {
            padding: 20px 40px;
            font-size: 1.2rem;
            background: #c6f6d5;
            color: #2d5a27;
            border: 2px solid white;
            border-radius: 100px;
            cursor: pointer;
            font-style: italic;
            transition: 0.3s;
        }
        #start-btn:hover { transform: scale(1.1); background: #ffc1cc; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="score-board">inner peace: <span id="score">0</span></div>
    <div id="player-basket">🧺</div>
    <div id="start-overlay">
        <h1>Nasrina's Oasis</h1>
        <button id="start-btn">catch some self-care</button>
    </div>
</div>

<script>
    const container = document.getElementById('game-container');
    const basket = document.getElementById('player-basket');
    const scoreEl = document.getElementById('score');
    const startOverlay = document.getElementById('start-overlay');
    const startBtn = document.getElementById('start-btn');

    let score = 0;
    let gameActive = false;
    const items = ['🌸', '🍵', '📖', '🕯️', '🌿', '🌷', '🧘‍♀️'];

    container.addEventListener('mousemove', (e) => {
        if (!gameActive) return;
        const rect = container.getBoundingClientRect();
        let x = e.clientX - rect.left - (basket.offsetWidth / 2);
        x = Math.max(0, Math.min(x, rect.width - basket.offsetWidth));
        basket.style.left = x + 'px';
    });

    function createItem() {
        if (!gameActive) return;
        const item = document.createElement('div');
        item.className = 'falling-item';
        item.innerText = items[Math.floor(Math.random() * items.length)];
        item.style.left = Math.random() * (container.offsetWidth - 40) + 'px';
        item.style.top = '-50px';
        container.appendChild(item);

        let top = -50;
        let speed = 3 + Math.random() * 4;

        const fallInterval = setInterval(() => {
            top += speed;
            item.style.top = top + 'px';

            const bRect = basket.getBoundingClientRect();
            const iRect = item.getBoundingClientRect();

            if (iRect.bottom >= bRect.top && iRect.right >= bRect.left && iRect.left <= bRect.right && iRect.top <= bRect.bottom) {
                score++;
                scoreEl.innerText = score;
                item.remove();
                clearInterval(fallInterval);
            }
            if (top > container.offsetHeight) {
                item.remove();
                clearInterval(fallInterval);
            }
        }, 20);
    }

    startBtn.addEventListener('click', () => {
        gameActive = true;
        score = 0;
        scoreEl.innerText = score;
        startOverlay.style.display = 'none';
        setInterval(createItem, 700);
    });
</script>
</body>
</html>
