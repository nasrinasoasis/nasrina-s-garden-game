<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nasrina's Pink Palace Oasis</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            margin: 0; padding: 0;
        }

        body, html {
            height: 100%; width: 100%;
            background: #fff5f7; overflow: hidden;
            font-family: 'Playfair Display', serif;
            display: flex; justify-content: center; align-items: center;
        }

        /* --- RESPONSIVE CONTAINER --- */
        #game-container {
            width: 100vw; height: 100vh;
            position: relative;
            background: linear-gradient(180deg, #fbc2eb 0%, #a6c1ee 100%);
            overflow: hidden;
            display: flex; flex-direction: column;
        }

        /* --- THE NASRINA DIALOGUE --- */
        #nasrina-box {
            position: absolute; top: 10%; left: 50%;
            transform: translateX(-50%); width: 90%; max-width: 400px;
            background: rgba(255, 255, 255, 0.9);
            border: 3px solid #ffc1cc; border-radius: 20px;
            padding: 15px; font-family: 'Press Start 2P', cursive;
            font-size: 8px; color: #5a7d55; z-index: 1000;
            box-shadow: 0 10px 20px rgba(255, 182, 193, 0.3);
        }

        #quest-text { display: block; margin-top: 5px; line-height: 1.5; }

        /* --- THE PLAYER (PINK FLOWER) --- */
        #player {
            position: absolute; bottom: 20%; left: 15%;
            font-size: 60px; z-index: 100;
            transition: bottom 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(0 5px 15px rgba(255,105,180,0.4));
        }

        /* --- GARDEN LAYERS --- */
        .petal {
            position: absolute; color: #ffc1cc; font-size: 20px;
            z-index: 20; animation: fall 6s linear infinite;
        }
        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        .collectible {
            position: absolute; bottom: 35%; font-size: 40px; z-index: 50;
        }

        /* --- START SCREEN --- */
        #start-screen {
            position: absolute; inset: 0; background: white;
            z-index: 2000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
        }

        button {
            padding: 15px 35px; border-radius: 50px; border: 2px solid #ffc1cc;
            background: white; font-family: 'Press Start 2P'; font-size: 10px;
            color: #db7093; margin-top: 20px; cursor: pointer;
        }
    </style>
</head>
<body onclick="jump()" ontouchstart="jump()">

<div id="game-container">
    <div id="nasrina-box">
        <span style="color: #ff69b4;">Nasrina:</span>
        <span id="quest-text">Welcome to the Pink Palace! Help me gather 5 sparkles...</span>
    </div>

    <div id="player">🌸</div>

    <div id="start-screen">
        <h1 style="font-style: italic; color: #ffb6c1; font-size: 32px;">Nasrina's Oasis</h1>
        <p style="color: #88b083;">tap to float through the garden</p>
        <button onclick="startGame(event)">ENTER PALACE</button>
    </div>
</div>

<script>
    let score = 0; let isJumping = false; let gameActive = false;
    const player = document.getElementById('player');
    const questText = document.getElementById('quest-text');
    const container = document.getElementById('game-container');

    function startGame(e) {
        e.stopPropagation();
        document.getElementById('start-screen').style.display = 'none';
        gameActive = true;
        setInterval(createPetal, 1500);
        spawnItem();
    }

    function createPetal() {
        if(!gameActive) return;
        const petal = document.createElement('div');
        petal.className = 'petal';
        petal.innerText = '🌸';
        petal.style.left = Math.random() * 100 + 'vw';
        container.appendChild(petal);
        setTimeout(() => petal.remove(), 6000);
    }

    function jump() {
        if (!gameActive || isJumping) return;
        isJumping = true;
        player.style.bottom = '55%';
        setTimeout(() => {
            player.style.bottom = '20%';
            setTimeout(() => { isJumping = false; }, 400);
        }, 400);
    }

    function spawnItem() {
        if (!gameActive) return;
        const item = document.createElement('div');
        item.className = 'collectible';
        item.innerText = ['✨', '💎', '🎀', '💿'][Math.floor(Math.random() * 4)];
        item.style.left = '110vw';
        container.appendChild(item);

        let pos = 110;
        const moveInt = setInterval(() => {
            if(!gameActive) return;
            pos -= 1;
            item.style.left = pos + 'vw';
            
            const pRect = player.getBoundingClientRect();
            const iRect = item.getBoundingClientRect();

            if (iRect.left < pRect.right - 10 && iRect.right > pRect.left + 10 && 
                iRect.top < pRect.bottom && iRect.bottom > pRect.top) {
                score++;
                if (score === 5) questText.innerText = "You've got the glow! Now let's find 10 ribbons.";
                item.remove(); clearInterval(moveInt);
            }
            if (pos < -20) { item.remove(); clearInterval(moveInt); }
        }, 20);
        setTimeout(spawnItem, 3500);
    }
</script>
</body>
</html>
