<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nasrina's Lush Oasis</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            cursor: url('https://cdn.cursors-4u.net/previews/pink-flowers-6f858f86-32.webp') 32 32, auto !important;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background: #fff5f7; overflow: hidden;
            font-family: 'Playfair Display', serif;
        }

        #game-container {
            width: 100vw; height: 100vh;
            max-width: 450px; position: relative;
            background: #fff0f5;
            overflow: hidden;
        }

        /* --- PARALLAX GARDEN LAYERS --- */
        #sky {
            position: absolute; top: 0; width: 100%; height: 100%;
            background: linear-gradient(180deg, #fbc2eb 0%, #a6c1ee 100%);
            opacity: 0.5; z-index: 1;
        }

        .garden-layer {
            position: absolute; bottom: 35%; width: 200%;
            display: flex; align-items: flex-end; white-space: nowrap;
        }

        #back-garden { height: 150px; z-index: 2; opacity: 0.4; animation: moveGarden 25s linear infinite; }
        #front-garden { height: 100px; z-index: 4; animation: moveGarden 15s linear infinite; }

        @keyframes moveGarden { from { transform: translateX(0); } to { transform: translateX(-50%); } }

        .bush { font-size: 80px; margin-right: 40px; filter: hue-rotate(10deg); }
        .flower-cluster { font-size: 40px; margin-right: 60px; }

        /* --- THE PATH --- */
        #path {
            position: absolute; bottom: 0; width: 200%; height: 35%;
            background: #fff; border-top: 6px solid #ffc1cc;
            z-index: 5; animation: moveGarden 10s linear infinite;
        }

        /* --- PLAYER --- */
        #player {
            position: absolute; bottom: 25%; left: 60px;
            font-size: 55px; z-index: 100;
            transition: bottom 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* --- ALICE BOX --- */
        #alice-box {
            position: absolute; top: 80px; left: 50%;
            transform: translateX(-50%); width: 85%;
            background: rgba(255, 255, 255, 0.95);
            border: 3px solid #ffc1cc; border-radius: 15px;
            padding: 15px; font-family: 'Press Start 2P', cursive;
            font-size: 7px; line-height: 1.6; color: #5a7d55;
            z-index: 1000; box-shadow: 0 10px 30px rgba(255, 182, 193, 0.3);
        }

        .collectible { position: absolute; bottom: 42%; font-size: 35px; z-index: 50; }

        #start-screen {
            position: absolute; inset: 0; background: white;
            z-index: 2000; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
        }

        #start-btn {
            padding: 20px 40px; border-radius: 50px; border: 2px solid #ffc1cc;
            background: white; font-family: 'Press Start 2P'; font-size: 8px;
            color: #db7093; cursor: pointer; margin-top: 25px;
        }
    </style>
</head>
<body onclick="jump()" ontouchstart="jump()">

<div id="game-container">
    <div id="sky"></div>

    <div id="back-garden" class="garden-layer">
        <span class="bush">🌳</span><span class="bush">🌳</span><span class="bush">🌳</span><span class="bush">🌳</span>
        <span class="bush">🌳</span><span class="bush">🌳</span><span class="bush">🌳</span><span class="bush">🌳</span>
    </div>

    <div id="front-garden" class="garden-layer">
        <span class="flower-cluster">🌸</span><span class="flower-cluster">🌷</span>
        <span class="flower-cluster">🌸</span><span class="flower-cluster">🌷</span>
        <span class="flower-cluster">🌸</span><span class="flower-cluster">🌷</span>
        <span class="flower-cluster">🌸</span><span class="flower-cluster">🌷</span>
    </div>

    <div id="path"></div>
    
    <div id="player">🧚‍♀️</div>

    <div id="alice-box">
        <span style="color: #ff69b4;">Alice:</span><br>
        <span id="quest-text">The garden is so lush today! Let's find 5 peonies...</span>
    </div>

    <div id="start-screen">
        <h1 style="font-style: italic; color: #ffb6c1; font-size: 30px;">The Lush Oasis</h1>
        <p style="color: #88b083;">walk through the petals...</p>
        <button onclick="startGame(event)">BEGIN STROLL</button>
    </div>
</div>

<script>
    let score = 0; let isJumping = false; let gameActive = false;
    const player = document.getElementById('player');
    const questText = document.getElementById('quest-text');

    function startGame(e) {
        e.stopPropagation();
        document.getElementById('start-screen').style.display = 'none';
        gameActive = true;
        spawnItem();
    }

    function jump() {
        if (!gameActive || isJumping) return;
        isJumping = true;
        player.style.bottom = '55%';
        setTimeout(() => {
            player.style.bottom = '25%';
            setTimeout(() => { isJumping = false; }, 450);
        }, 450);
    }

    function spawnItem() {
        if (!gameActive) return;
        const item = document.createElement('div');
        item.className = 'collectible';
        item.innerText = ['🌸', '🌷', '🎀', '✨'][Math.floor(Math.random() * 4)];
        document.getElementById('game-container').appendChild(item);

        let pos = 500;
        const moveInt = setInterval(() => {
            if(!gameActive) return;
            pos -= 5;
            item.style.left = pos + 'px';

            const pRect = player.getBoundingClientRect();
            const iRect = item.getBoundingClientRect();

            if (iRect.left < pRect.right - 10 && iRect.right > pRect.left + 10 && iRect.top < pRect.bottom && iRect.bottom > pRect.top) {
                score++;
                if (score === 5) questText.innerText = "Task: Collect 10 crystals for your aura. ✨";
                item.remove(); clearInterval(moveInt);
            }
            if (pos < -50) { item.remove(); clearInterval(moveInt); }
        }, 20);
        setTimeout(spawnItem, 2500);
    }
</script>
</body>
</html>
